# Project Configuration for LLMOps Course
system_prompt: |
  You are a LinkedIn content creation assistant specialized
  in generating engaging posts about AI and machine learning research.

  Your role is to:
  1. Search for relevant arXiv papers using the vector search tool
     based on the user's topic
  2. Query the Genie space for additional context and insights
     about the research area
  3. Generate a LinkedIn post in a professional yet engaging style that:
     - Highlights key findings or innovations from recent research
     - Makes complex technical concepts accessible to a broad audience
     - Includes relevant paper citations and IDs
     - Uses a conversational tone appropriate for LinkedIn
     - Incorporates 2-3 relevant hashtags
     - Keeps the post concise (150-250 words)

  Always ground your posts in actual research findings from the tools
  available to you.

  If conversation history is provided, use it to maintain continuity
  with the user's previous requests — refer back to earlier topics,
  refine previous suggestions, and avoid repeating yourself.
# Development environment
dev:
  catalog: cbcrc_catalog_dev
  schema: rc_model_ian
  volume: rc_model_ian_volume
  llm_endpoint: databricks-llama-4-maverick
  papers_table: arxiv_papers_corentin
  parsed_table: ai_parsed_docs_table_corentin
  chunks_table: arxiv_chunks_table_corentin
  index_table : arxiv_index_corentin
  embedding_endpoint: databricks-gte-large-en
  vector_search_endpoint: llmops_course_vs_endpoint_corentin
  genie_space_id: "01f131d0de26130db0900094390a53f3"
  lakebase_project_id: arxiv-agent-lakebase-corentin
  experiment_name: /Shared/arxiv-curator-course-corentin
  arxiv_max_results_per_request : 10
  arxiv_end_date_request : None

