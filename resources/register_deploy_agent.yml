resources:
  jobs:
    register_deploy_agent:
      name: arxiv-agent-register-deploy-pipeline
      tags:
        project_name: "llmops-databricks-course-Corentin"
        team: "rc_ian"
        owner: "rcian"
        environment: ${bundle.target}
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      # Timeout
      timeout_seconds: 3600

      tasks:
        - task_key: log_register_agent
          environment_key: default
          spark_python_task:
            python_file: ../scripts/2_log_register_agent.py
            parameters:
              - "--env"
              - "${bundle.target}"
              - "--git_sha"
              - "${var.git_sha}"
              - "--run_id"
              - "{{job.run_id}}"

        - task_key: deploy_agent
          depends_on:
            - task_key: log_register_agent
          environment_key: default
          spark_python_task:
            python_file: ../scripts/3_deploy_agent.py
            parameters:
              - "--env"
              - "${bundle.target}"
              - "--git_sha"
              - "${var.git_sha}"
