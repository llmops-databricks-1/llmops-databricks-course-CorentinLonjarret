resources:
  jobs:
    update-and-evaluate-traces:
      name: arxiv-update-and-evaluate-traces
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"
        timezone_id: "Europe/Amsterdam"
        pause_status: ${var.schedule_pause_status}
      tags:
        project_name: "llmops-databricks-course-Corentin"
        team: "rc_ian"
        owner: "rcian"
        environment: ${bundle.target}
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      # Timeout
      timeout_seconds: 3600

      tasks:
        - task_key: update_and_evaluate
          environment_key: default
          notebook_task:
            notebook_path: ../scripts/update_traces_aggregated.py
            base_parameters:
              env: ${bundle.target}
