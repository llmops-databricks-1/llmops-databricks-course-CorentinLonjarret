resources:
  jobs:
    arxiv_data_ingestion_job:
      name: arxiv_data_ingestion
      tags:
        project_name: "llmops-databricks-course-CorentinLonjarret"
        team: "rc_ian"
        owner: "rcian"
        developer: "corentin lonjarret"

      # Timeout
      timeout_seconds: 500

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: arxiv_data_ingestion
          environment_key: default
          spark_python_task:
            python_file: ../scripts/1_ingest_arxiv_papers.py
            parameters:
              - "--root_path"
              - "${workspace.root_path}"
              - "--env"
              - "${bundle.target}"
              - "--git_sha"
              - "${var.git_sha}"
              - "--job_run_id"
              - "{{job.run_id}}"
